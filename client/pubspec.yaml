publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.3.3
  flutter_secure_storage: ^8.0.0
  flutter_dotenv: ^5.1.0
  get_it: ^7.6.4
  provider: ^6.1.1
  intl: ^0.18.1
  fl_chart: ^0.65.0
